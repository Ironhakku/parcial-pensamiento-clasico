function actualizarVistaProfesor(d) {
  const qi = d.preguntaActual ?? -1;
  const total = PREGUNTAS.length;
  const estados = { esperando:'⏳ Esperando inicio', jugando:`▶ Pregunta ${qi+1} de ${total}`, ranking:'🏆 Ranking final', terminado:'✔ Parcial terminado' };
  document.getElementById('p-estado').textContent = estados[d.estado] || 'Listo';

  if (qi >= 0 && qi < total) {
    const q = PREGUNTAS[qi];
    document.getElementById('p-num').textContent = `Sesión ${q.sesion} · ${q.tema} · ${q.tipo === 'vf' ? 'V/F' : 'Selección múltiple'}`;
    document.getElementById('p-q-texto').textContent = q.pregunta;
    document.getElementById('p-q-opciones').innerHTML = q.opciones.map((op,i) =>
      `<div style="padding:2px 0;color:${i===q.correcta?'#7dcf90':'#6b6050'}">${String.fromCharCode(65+i)}) ${op}${i===q.correcta?' ✓':''}</div>`
    ).join('');
  }

  const respuestas = d.respuestas?.[qi] || {};
  const grupos = Object.keys(respuestas);
  document.getElementById('p-respuestas').innerHTML = grupos.length === 0
    ? '<span style="color:#3a3428">Sin respuestas aún</span>'
    : grupos.map(g => {
        const r = respuestas[g];
        const ok = PREGUNTAS[qi] && r.opcion === PREGUNTAS[qi].correcta;
        return `<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #1e1c14;font-size:0.8rem;">
          <span style="color:#a09070">${g}</span>
          <span style="color:${ok?'#7dcf90':'#e07070'}">${ok?'✓ Correcta':'✗ Incorrecta'}</span>
        </div>`;
      }).join('');

  const puntajes = d.puntajes || {};
  const ordenados = Object.entries(puntajes).sort((a,b)=>b[1]-a[1]);
  document.getElementById('p-ranking').innerHTML = ordenados.length === 0
    ? '<span style="color:#3a3428">Sin puntajes aún</span>'
    : ordenados.map(([g,p],i) =>
        `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1e1c14;">
          <span style="color:#c9a84c">${i+1}. ${g}</span>
          <span style="font-weight:700">${p} pts</span>
        </div>`
      ).join('');

  const registrados = d.grupos || {};
  document.getElementById('p-grupos').innerHTML = Object.keys(registrados).length === 0
    ? '<span style="color:#3a3428">Ningún grupo registrado</span>'
    : Object.entries(registrados).map(([nombre, info]) =>
        `<div style="padding:3px 0;border-bottom:1px solid #1e1c14;font-size:0.78rem;">
          <span style="color:#c9a84c">${nombre}</span>
          <span style="color:#6b6050;margin-left:6px;">${(info.miembros||[]).join(', ')}</span>
        </div>`
      ).join('');
}

  await update(ref(db,'juego'), {estado:'ranking'});
};
window.profe_reiniciar = async () => {
  if (confirm('¿Reiniciar todo el juego? Se perderán puntajes y grupos registrados.')) {
    await set(ref(db,'juego'), {estado:'esperando', preguntaActual:-1, puntajes:{}, respuestas:{}, grupos:{}});
  }
};
window.profe_notas = () => {
  generarTablaNotas();
  document.getElementById('modal-notas').style.display = 'block';
};

function generarTablaNotas() {
  const puntajes = estadoLocal.puntajes || {};
  const grupos = estadoLocal.grupos || {};
  const maxPts = PREGUNTAS.length * 100;
  let filas = '';
  let csvData = [['Grupo','Integrantes','Puntos','Nota (sobre 5.0)']];

  Object.entries(grupos).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([nombre, info]) => {
    const pts = puntajes[nombre] || 0;
    const nota = Math.round((pts / maxPts) * 5 * 10) / 10;
    const miembros = (info.miembros || []).join(' / ');
    filas += `<tr>
      <td style="padding:6px 10px;color:#c9a84c;font-size:0.82rem;">${nombre}</td>
      <td style="padding:6px 10px;color:#a09070;font-size:0.78rem;">${miembros}</td>
      <td style="padding:6px 10px;text-align:center;color:#f0ead8;">${pts}</td>
      <td style="padding:6px 10px;text-align:center;color:${nota>=3?'#7dcf90':'#e07070'};font-weight:700;">${nota.toFixed(1)}</td>
    </tr>`;
    csvData.push([nombre, miembros, pts, nota.toFixed(1)]);
  });

  document.getElementById('tabla-notas').innerHTML = `
    <table style="width:100%;border-collapse:collapse;font-family:Georgia,serif;">
      <thead>
        <tr style="border-bottom:2px solid #3a3520;">
          <th style="padding:8px 10px;text-align:left;font-size:0.8rem;color:#6b6050;font-weight:500;">Grupo</th>
          <th style="padding:8px 10px;text-align:left;font-size:0.8rem;color:#6b6050;font-weight:500;">Integrantes</th>
          <th style="padding:8px 10px;text-align:center;font-size:0.8rem;color:#6b6050;font-weight:500;">Pts (/${maxPts})</th>
          <th style="padding:8px 10px;text-align:center;font-size:0.8rem;color:#6b6050;font-weight:500;">Nota /5.0</th>
        </tr>
      </thead>
      <tbody>${filas || '<tr><td colspan="4" style="padding:1rem;text-align:center;color:#3a3428">Sin grupos registrados aún</td></tr>'}</tbody>
    </table>`;

  window._csvData = csvData;
}

window.profe_exportarCSV = () => {
  const rows = window._csvData || [];
  const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'notas_pensamiento_clasico_2026.csv';
  a.click();
};

// ══════════════════════════════════════════════════════════════════════
// VISTA JUGADOR (CELULAR)
// ══════════════════════════════════════════════════════════════════════
function renderJugador() {
  gameRef = ref(db,'juego');
  document.getElementById('app').innerHTML = `
    <div style="min-height:100vh;background:#0d0f1a;color:#f0ead8;font-family:Georgia,serif;padding:1.2rem;max-width:440px;margin:0 auto;">
      <div style="text-align:center;margin-bottom:1.5rem;">
        <div style="font-size:10px;letter-spacing:2px;color:#6b6050;text-transform:uppercase;">Pensamiento Clásico · Parcial</div>
        <div style="font-size:10px;color:#4a4030;margin-top:2px;">Sesiones 11–13 · 2026-I</div>
      </div>
      <div id="j-contenido"></div>
    </div>`;

  mostrarFormularioGrupo();

  onValue(ref(db,'juego'), snap => {
    estadoLocal = snap.val() || {};
  });
}

function mostrarFormularioGrupo() {
  const cont = document.getElementById('j-contenido');
  cont.innerHTML = `
    <div style="margin-bottom:1.2rem;">
      <label style="font-size:0.85rem;color:#8a7a60;display:block;margin-bottom:0.5rem;">Nombre del grupo</label>
      <input id="j-nombre-grupo" type="text" placeholder="Ej: Grupo Alpha" maxlength="30"
        style="width:100%;padding:0.7rem;background:#1a1d2e;border:1px solid #3a3520;border-radius:8px;color:#f0ead8;font-size:0.95rem;font-family:Georgia,serif;">
    </div>
    <div style="margin-bottom:1.2rem;">
      <div style="font-size:0.85rem;color:#8a7a60;margin-bottom:0.5rem;">Integrantes del grupo <span style="color:#4a4030;">(selecciona los miembros)</span></div>
      <div id="lista-estudiantes" style="max-height:280px;overflow-y:auto;background:#141728;border:1px solid #2a2e42;border-radius:8px;padding:0.5rem;">
        ${ESTUDIANTES.map(e => `
          <label style="display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:5px;cursor:pointer;font-size:0.82rem;color:#c0b090;">
            <input type="checkbox" value="${e}" style="accent-color:#c9a84c;width:15px;height:15px;">
            ${e}
          </label>`).join('')}
      </div>
    </div>
    <button onclick="window.jugador_registrar()" style="width:100%;padding:0.9rem;background:#c9a84c;color:#1a1208;border:none;border-radius:8px;font-size:1rem;font-weight:700;">
      Registrar grupo y unirse
    </button>`;
}

window.jugador_registrar = async () => {
  const nombre = document.getElementById('j-nombre-grupo').value.trim();
  if (!nombre) { alert('Escribe el nombre del grupo'); return; }
  const checks = document.querySelectorAll('#lista-estudiantes input[type=checkbox]:checked');
  const miembros = Array.from(checks).map(c => c.value);
  if (miembros.length === 0) { alert('Selecciona al menos un integrante'); return; }

  await update(ref(db, 'juego/grupos'), {
    [nombre]: { miembros }
  });

  iniciarVistaJuego(nombre);
};

function iniciarVistaJuego(grupo) {
  const cont = document.getElementById('j-contenido');
  const idx = Object.keys(estadoLocal.grupos || {}).length % COLORES_GRUPO.length;
  const color = COLORES_GRUPO[idx];
  let respondioEsta = {};

  cont.innerHTML = `
    <div style="text-align:center;margin-bottom:1.2rem;">
      <div style="font-size:10px;color:#6b6050;letter-spacing:1px;margin-bottom:4px;">JUGANDO COMO</div>
      <div style="font-size:1.6rem;font-weight:700;color:${color};margin-bottom:4px;">${grupo}</div>
      <div id="j-pts" style="font-size:0.85rem;color:#8a7a60;">0 pts</div>
    </div>
    <div id="j-estado" style="font-size:0.9rem;color:#8a7a60;text-align:center;margin-bottom:1rem;">Esperando que el profesor inicie...</div>
    <div id="j-zona-pregunta"></div>`;

  onValue(ref(db,'juego'), snap => {
    const d = snap.val() || {};
    estadoLocal = d;
    const qi = d.preguntaActual ?? -1;
    const zona = document.getElementById('j-zona-pregunta');
    const estado = document.getElementById('j-estado');
    const pts = document.getElementById('j-pts');
    if (!zona) return;

    if (pts) pts.textContent = `${d.puntajes?.[grupo] || 0} pts`;

    if (d.estado === 'esperando' || qi < 0) {
      if (estado) estado.textContent = 'Esperando inicio del profesor...';
      zona.innerHTML = '';
      return;
    }

    if (d.estado === 'ranking') {
      const puntajes = d.puntajes || {};
      const ordenados = Object.entries(puntajes).sort((a,b)=>b[1]-a[1]);
      const miPos = ordenados.findIndex(([g])=>g===grupo)+1;
      const misPts = puntajes[grupo]||0;
      const maxPts = PREGUNTAS.length * 100;
      const nota = Math.round((misPts / maxPts) * 5 * 10) / 10;
      if (estado) estado.textContent = '';
      zona.innerHTML = `
        <div style="text-align:center;padding:1.5rem 0;">
          <div style="font-size:2.5rem;margin-bottom:0.5rem;">🏆</div>
          <div style="font-size:1.4rem;color:#c9a84c;margin-bottom:0.3rem;">${grupo}</div>
          <div style="font-size:2.8rem;font-weight:700;color:#f0ead8;">${misPts}</div>
          <div style="font-size:0.85rem;color:#8a7a60;margin-bottom:0.3rem;">puntos · Puesto ${miPos}</div>
          <div style="font-size:1.5rem;font-weight:700;color:${nota>=3?'#7dcf90':'#e07070'};margin-bottom:1.5rem;">Nota: ${nota.toFixed(1)} / 5.0</div>
          <div style="font-size:10px;color:#4a4030;letter-spacing:1px;margin-bottom:0.8rem;">RANKING FINAL</div>
          ${ordenados.map(([g,p],i)=>`
            <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1e1c14;font-size:0.85rem;">
              <span style="color:${g===grupo?'#c9a84c':'#8a7a60'}">${i+1}. ${g}</span>
              <span style="color:${g===grupo?'#f0ead8':'#6b6050'}">${p} pts</span>
            </div>`).join('')}
        </div>`;
      return;
    }

    if (d.estado !== 'jugando') return;
    const q = PREGUNTAS[qi];
    if (!q) return;

    if (estado) estado.textContent = `Pregunta ${qi+1} de ${PREGUNTAS.length} · ${q.tema}`;

    const yaRespondio = d.respuestas?.[qi]?.[grupo] !== undefined;
    if (yaRespondio || respondioEsta[qi]) {
      const resp = d.respuestas?.[qi]?.[grupo];
      const ok = resp && resp.opcion === q.correcta;
      zona.innerHTML = `
        <div style="text-align:center;padding:1.5rem 0;">
          <div style="font-size:3rem;margin-bottom:0.5rem;">${ok?'✅':'❌'}</div>
          <div style="font-size:1rem;color:${ok?'#7dcf90':'#e07070'};margin-bottom:0.5rem;">${ok?'¡Correcto! +100 pts':'Incorrecto'}</div>
          ${ok?'':'<div style="font-size:0.8rem;color:#8a7a60;margin-bottom:0.3rem;">Respuesta correcta: '+(String.fromCharCode(65+q.correcta))+') '+q.opciones[q.correcta]+'</div>'}
          <div style="font-size:0.8rem;color:#4a4030;margin-top:0.8rem;">Esperando siguiente pregunta...</div>
        </div>`;
      respondioEsta[qi] = true;
      return;
    }

    zona.innerHTML = `
      <div style="background:#141728;border:1px solid #2a2e42;border-radius:10px;padding:1rem;margin-bottom:1rem;font-size:0.95rem;line-height:1.6;">
        ${q.pregunta}
      </div>
      <div style="display:grid;gap:0.5rem;">
        ${q.opciones.map((op,i)=>`
          <button onclick="window.jugador_responder('${grupo}',${qi},${i})"
            style="padding:0.8rem;background:#141728;border:1px solid #3a3520;border-radius:8px;color:#f0ead8;font-size:0.9rem;font-family:Georgia,serif;text-align:left;line-height:1.4;">
            <span style="color:#c9a84c;font-weight:700;">${String.fromCharCode(65+i)})</span> ${op}
          </button>`).join('')}
      </div>`;
  });
}

window.jugador_responder = async (grupo, qi, opcion) => {
  const d = estadoLocal;
  if (d.respuestas?.[qi]?.[grupo] !== undefined) return;
  const ok = opcion === PREGUNTAS[qi].correcta;
  const ptsActual = d.puntajes?.[grupo] || 0;
  const updates = {};
  updates[`respuestas/${qi}/${grupo}`] = { opcion };
  if (ok) updates[`puntajes/${grupo}`] = ptsActual + 100;
  await update(ref(db,'juego'), updates);
};

// ── INIT ──────────────────────────────────────────────────────────────
const view = getView();
if (view === 'profesor') renderProfesor();
else if (view === 'jugador') renderJugador();
else renderInicio();

onValue(ref(db,'juego'), snap => { estadoLocal = snap.val() || {}; });
</script>
