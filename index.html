// ── HELPERS ──────────────────────────────────────────────────────────────────
function getComboMult(streak) {
  if (streak >= 4) return COMBO_MULT_MAX;
  return COMBO_MULT[streak] || 1.0;
}

function calcPuntos(posicion, streak) {
  const base = posicion <= 3 ? PUNTOS_POS[posicion - 1] : PUNTOS_POS[3];
  const mult = posicion <= 3 ? getComboMult(streak) : 1.0;
  return Math.round(base * mult);
}

function getNota(puesto) {
  if (puesto <= NOTAS_POR_PUESTO.length) return NOTAS_POR_PUESTO[puesto - 1];
  return 2.0;

function updProf(d) {
  const qi = d.preguntaActual ?? -1, tot = PREGUNTAS.length;
  const st = { esperando:'STANDBY — GRUPOS REGISTRÁNDOSE', jugando:`PREGUNTA ${qi+1} / ${tot}`, ranking:'RESULTADO FINAL', reglas:'MOSTRANDO REGLAS' };
  const statusEl = document.getElementById('pe-status');
  if (statusEl) statusEl.textContent = st[d.estado] || 'STANDBY';

  const prog = document.getElementById('pe-progress');
  if (prog) prog.style.width = qi >= 0 ? `${((qi+1)/tot)*100}%` : '0%';

  // Timer visual
  const timerProj = document.getElementById('pe-timer-proj');
  if (d.estado === 'jugando' && d.timerStart) {
    if (timerProj) timerProj.style.display = 'flex';
    startProjTimer(d.timerStart);
  } else {
    if (timerProj) timerProj.style.display = 'none';
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  }

  if (qi >= 0 && qi < tot && d.estado === 'jugando') {
    const q = PREGUNTAS[qi];
    const meta = document.getElementById('pe-meta');
    const qt = document.getElementById('pe-q-text');
    const qo = document.getElementById('pe-options');
    if (meta) meta.textContent = `SESIÓN ${q.s} · ${q.t} · PREGUNTA ${qi+1} DE ${tot}`;
    if (qt) qt.textContent = q.p;
    // SIN marcar la correcta
    if (qo) qo.innerHTML = q.o.map((op,i) => `
      <div class="projector-option">
        <span class="opt-letter">${String.fromCharCode(65+i)})</span><span>${op}</span>
      </div>`).join('');
  } else if (d.estado === 'ranking') {
    const qt = document.getElementById('pe-q-text');
    const qo = document.getElementById('pe-options');
    const meta = document.getElementById('pe-meta');
    if (meta) meta.textContent = 'RESULTADO FINAL DEL PARCIAL';
    if (qt) qt.textContent = '🏆 Clasificación Final';
    if (qo) {
      const pts = d.puntajes||{}, ord = Object.entries(pts).sort((a,b)=>b[1]-a[1]);
      qo.innerHTML = ord.map(([g,p],i) => {
        const nt = getNota(i+1);
        return `<div class="rank-item rank-${i+1}" style="font-family:var(--font-body);">
          <span style="font-family:var(--font-display);font-size:13px;color:var(--uv-gold);min-width:24px;">${i+1}°</span>
          <span style="flex:1;margin-left:8px;">${g}</span>
          <span style="font-family:var(--font-mono);color:var(--uv-cyan);margin-right:12px;">${p} pts</span>
          <span style="font-family:var(--font-display);font-weight:700;color:${nt>=3?'#00ff88':'#ff6b6b'};font-size:1rem;">${nt.toFixed(1)}</span>
        </div>`;
      }).join('');
    }
  } else if (d.estado === 'reglas') {
    const qt = document.getElementById('pe-q-text');
    const qo = document.getElementById('pe-options');
    const meta = document.getElementById('pe-meta');
    if (meta) meta.textContent = 'REGLAS DEL PARCIAL — LEAN ATENTAMENTE';
    if (qt) qt.textContent = '📋 Reglas del Parcial Interactivo';
    if (qo) qo.innerHTML = REGLAS.map(r=>`
      <div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid rgba(0,212,255,0.1);">
        <span style="font-size:1.2rem;min-width:28px;">${r.icon}</span>
        <div>
          <div style="font-family:var(--font-mono);font-size:10px;color:var(--uv-cyan);letter-spacing:1px;margin-bottom:2px;">${r.title}</div>
          <div style="font-size:0.82rem;color:rgba(200,220,255,0.8);">${r.text.replace(/<strong>/g,'').replace(/<\/strong>/g,'')}</div>
        </div>
      </div>`).join('');
  } else {
    const qt = document.getElementById('pe-q-text');
    const qo = document.getElementById('pe-options');
    const meta = document.getElementById('pe-meta');
    if (meta) meta.textContent = 'ESPERANDO GRUPOS';
    if (qt) qt.textContent = 'Los grupos se están registrando...';
    if (qo) qo.innerHTML = '';
  }

  const respuestas = d.respuestas?.[qi] || {};
  const numResp = Object.keys(respuestas).length;
  const numGrupos = Object.keys(d.grupos||{}).length;
  const countEl = document.getElementById('pe-count');
  const countTotal = document.getElementById('pe-count-total');
  if (countEl) countEl.textContent = numResp;
  if (countTotal) countTotal.textContent = `de ${numGrupos} grupos`;

  const pts = d.puntajes||{}, ord = Object.entries(pts).sort((a,b)=>b[1]-a[1]);
  const rankEl = document.getElementById('pe-ranking');
  if (rankEl) rankEl.innerHTML = ord.length === 0
    ? '<span style="opacity:0.4">Sin puntajes aún</span>'
    : ord.slice(0,5).map(([g,p],i)=>`
      <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(0,212,255,0.1);">
        <span style="color:${i===0?'var(--uv-gold)':'rgba(200,220,255,0.7)'}">${i+1}. ${g}</span>
        <span style="font-family:var(--font-mono);color:var(--uv-cyan)">${p}</span>
      </div>`).join('');

  const reg = d.grupos||{};
  const gruposEl = document.getElementById('pe-grupos');
  if (gruposEl) gruposEl.innerHTML = Object.keys(reg).length === 0
    ? '<span style="opacity:0.4">Ninguno aún</span>'
    : Object.entries(reg).map(([n,info])=>`
      <div style="padding:3px 0;border-bottom:1px solid rgba(0,212,255,0.1);font-size:0.72rem;">
        <span style="color:var(--uv-cyan)">${n}</span>
        <span style="opacity:0.5;margin-left:4px;">(${(info.miembros||[]).length})</span>
        ${info.reglasAceptadas?'<span style="color:#00ff88;margin-left:4px;">✓</span>':'<span style="color:rgba(200,220,255,0.3);margin-left:4px;">⏳</span>'}
      </div>`).join('');
}

let lastTimerQi = -1;
function startProjTimer(timerStart) {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  const circle = document.getElementById('pe-timer-circle');
  const num = document.getElementById('pe-timer-num');
  const circumference = 125.66;
  timerInterval = setInterval(() => {
    const elapsed = (Date.now() - timerStart) / 1000;
    const remaining = Math.max(0, TIMER_SECS - elapsed);
    if (num) num.textContent = Math.ceil(remaining);
    if (circle) {
      const offset = circumference * (1 - remaining / TIMER_SECS);
      circle.style.strokeDashoffset = offset;
      circle.style.stroke = remaining <= 10 ? (remaining <= 5 ? 'var(--uv-red)' : 'var(--uv-gold)') : 'var(--uv-cyan)';
    }
    if (remaining <= 0) { clearInterval(timerInterval); timerInterval = null; }
  }, 250);
}

window.pI = async () => {
  await set(gameRef, { estado:'reglas', preguntaActual:-1, puntajes:{}, respuestas:{}, grupos: estado.grupos||{}, combos:{} });
};
window.pS = async () => {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  const qi = estado.preguntaActual ?? -1;
  if (estado.estado === 'reglas') {
    await update(gameRef, { estado:'jugando', preguntaActual:0, timerStart: Date.now() });
    scheduleAutoAdvance(0);
  } else if (qi + 1 >= PREGUNTAS.length) {
    await update(gameRef, { estado:'ranking', timerStart: null });
  } else {
    const next = qi + 1;
    await update(gameRef, { preguntaActual: next, estado:'jugando', timerStart: Date.now() });
    scheduleAutoAdvance(next);
  }
};
window.pR = async () => { await update(gameRef, { estado:'ranking', timerStart: null }); };
window.pRe = async () => {
  if (confirm('¿Reiniciar todo el juego?')) {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    await set(gameRef, { estado:'esperando', preguntaActual:-1, puntajes:{}, respuestas:{}, grupos:{}, combos:{} });
  }
};
window.pN = () => { genNotas(); document.getElementById('modal-notas').style.display = 'flex'; };

// Auto-advance timer (profesor controla desde su lado)
let autoAdvTimeout = null;
function scheduleAutoAdvance(qi) {
  if (autoAdvTimeout) clearTimeout(autoAdvTimeout);
  autoAdvTimeout = setTimeout(async () => {
    const d = estado;
    if (d.estado === 'jugando' && d.preguntaActual === qi) {
      if (qi + 1 >= PREGUNTAS.length) {
        await update(gameRef, { estado:'ranking', timerStart: null });
      } else {
        const next = qi + 1;
        await update(gameRef, { preguntaActual: next, timerStart: Date.now() });
        scheduleAutoAdvance(next);
      }
    }
  }, (TIMER_SECS + 1) * 1000);
}

function genNotas() {
  const pts = estado.puntajes||{}, grps = estado.grupos||{};
  const ord = Object.entries(pts).sort((a,b)=>b[1]-a[1]);
  let rows = '', csv = [['Puesto','Grupo','Integrantes','Puntos','Nota /5.0']];
  ord.forEach(([n,p], i) => {
    const nt = getNota(i+1), info = grps[n]||{}, mb = (info.miembros||[]).join(' / ');
    rows += `<tr>
      <td style="padding:6px 8px;font-family:var(--font-display);font-size:12px;color:var(--uv-gold);text-align:center;">${i+1}°</td>
      <td style="padding:6px 8px;font-family:var(--font-mono);font-size:11px;color:var(--uv-cyan);">${n}</td>
      <td style="padding:6px 8px;font-size:11px;color:rgba(200,220,255,0.7);">${mb}</td>
      <td style="padding:6px 8px;text-align:center;font-family:var(--font-mono);">${p}</td>
      <td style="padding:6px 8px;text-align:center;font-family:var(--font-display);font-weight:700;color:${nt>=3?'#00ff88':'#ff6b6b'}">${nt.toFixed(1)}</td>
    </tr>`;
    csv.push([i+1, n, mb, p, nt.toFixed(1)]);
  });
  // Grupos sin puntos
  Object.entries(grps).forEach(([n,info]) => {
    if (!pts[n]) {
      const idx = ord.length + 1, nt = getNota(idx), mb = (info.miembros||[]).join(' / ');
      rows += `<tr>
        <td style="padding:6px 8px;font-family:var(--font-display);font-size:12px;color:rgba(200,220,255,0.4);text-align:center;">—</td>
        <td style="padding:6px 8px;font-family:var(--font-mono);font-size:11px;color:rgba(0,212,255,0.4);">${n}</td>
        <td style="padding:6px 8px;font-size:11px;color:rgba(200,220,255,0.4);">${mb}</td>
        <td style="padding:6px 8px;text-align:center;font-family:var(--font-mono);color:rgba(200,220,255,0.4);">0</td>
        <td style="padding:6px 8px;text-align:center;font-family:var(--font-display);font-weight:700;color:#ff6b6b">2.0</td>
      </tr>`;
      csv.push(['-', n, mb, 0, '2.0']);
    }
  });
  document.getElementById('tabla-notas').innerHTML = `
    <table style="width:100%;border-collapse:collapse;">
      <thead><tr style="border-bottom:2px solid rgba(0,212,255,0.2);">
        <th style="padding:7px 8px;font-family:var(--font-mono);font-size:10px;color:rgba(0,212,255,0.5);font-weight:400;text-align:center;">#</th>
        <th style="padding:7px 8px;font-family:var(--font-mono);font-size:10px;color:rgba(0,212,255,0.5);font-weight:400;">GRUPO</th>
        <th style="padding:7px 8px;font-family:var(--font-mono);font-size:10px;color:rgba(0,212,255,0.5);font-weight:400;">INTEGRANTES</th>
        <th style="padding:7px 8px;font-family:var(--font-mono);font-size:10px;color:rgba(0,212,255,0.5);font-weight:400;text-align:center;">PTS</th>
        <th style="padding:7px 8px;font-family:var(--font-mono);font-size:10px;color:rgba(0,212,255,0.5);font-weight:400;text-align:center;">NOTA</th>
      </tr></thead>
      <tbody>${rows||'<tr><td colspan="5" style="padding:1rem;text-align:center;opacity:0.4;">Sin datos</td></tr>'}</tbody>
    </table>`;
  window._csv = csv;
}
window.pCSV = () => {
  const c = (window._csv||[]).map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(new Blob([c],{type:'text/csv'})), download:'notas_pensamiento_clasico_2026.csv' });
  a.click();
};

      </div>
      <div style="margin-bottom:1.2rem;">
        <label style="font-family:var(--font-mono);font-size:11px;color:var(--uv-cyan);letter-spacing:1px;display:block;margin-bottom:6px;">INTEGRANTES DEL GRUPO</label>
        <div id="le" style="max-height:240px;overflow-y:auto;background:rgba(0,9,26,0.5);border:1px solid rgba(0,212,255,0.15);border-radius:8px;padding:0.4rem;">
          ${ESTUDIANTES.map(e=>`
            <label style="display:flex;align-items:center;gap:10px;padding:5px 8px;border-radius:5px;cursor:pointer;">
              <input type="checkbox" value="${e}" style="accent-color:var(--uv-cyan);width:15px;height:15px;">
              <span style="font-size:0.8rem;color:rgba(200,220,255,0.8);">${e}</span>
            </label>`).join('')}
        </div>
      </div>
      <button onclick="window.jRg()" class="btn-primary" style="width:100%;padding:0.9rem;font-size:0.9rem;">
        REGISTRAR GRUPO →
      </button>
    </div>`;
}

window.jRg = async () => {
  const n = document.getElementById('jn').value.trim();
  if (!n) { alert('Escribe el nombre del grupo'); return; }
  const mb = Array.from(document.querySelectorAll('#le input:checked')).map(c=>c.value);
  if (mb.length === 0) { alert('Selecciona al menos un integrante'); return; }
  await update(ref(db,'juego/grupos'), { [n]: { miembros: mb, reglasAceptadas: false } });
  mostrarReglas(n, mb);
};

function mostrarReglas(grupo, miembros) {
  const c = document.getElementById('jc');
  c.innerHTML = `
    <div class="panel corner-deco animate-up" style="padding:1.5rem;">
      <div style="text-align:center;margin-bottom:1.2rem;">
        <div class="label" style="margin-bottom:4px;">REGLAMENTO DEL PARCIAL</div>
        <div style="font-family:var(--font-display);font-size:1rem;color:var(--uv-gold);">${grupo}</div>
      </div>
      <div style="margin-bottom:1.2rem;">
        ${REGLAS.map(r=>`
          <div class="rule-item">
            <span class="rule-icon">${r.icon}</span>
            <div class="rule-text">
              <strong>${r.title}</strong><br>${r.text}
            </div>
          </div>`).join('')}
      </div>
      <div style="background:rgba(0,48,135,0.2);border:1px solid rgba(0,212,255,0.2);border-radius:8px;padding:0.8rem;margin-bottom:1rem;font-size:0.82rem;color:rgba(200,220,255,0.7);text-align:center;">
        Al aceptar confirmas que tu grupo leyó y entendió las reglas.
      </div>
      <button onclick="window.jAceptar('${grupo}')" class="btn-primary" style="width:100%;padding:0.9rem;font-size:0.9rem;background:linear-gradient(135deg,#006622,var(--uv-green));">
        ✓ ACEPTAR REGLAS Y CONTINUAR
      </button>
    </div>`;
}

window.jAceptar = async (grupo) => {
  await update(ref(db,`juego/grupos/${grupo}`), { reglasAceptadas: true });
  esperarInicio(grupo);
};

function esperarInicio(grupo) {
  const c = document.getElementById('jc');
  const color = GRUP_COLORS[Object.keys(estado.grupos||{}).length % GRUP_COLORS.length];
  c.innerHTML = `
    <div class="panel corner-deco animate-up" style="padding:2rem;text-align:center;">
      <div class="label" style="margin-bottom:0.8rem;">GRUPO REGISTRADO</div>
      <div style="font-family:var(--font-display);font-size:1.6rem;font-weight:900;color:${color};letter-spacing:2px;text-shadow:0 0 20px ${color}50;margin-bottom:0.5rem;">${grupo}</div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--uv-cyan);margin-bottom:2rem;">REGLAS ACEPTADAS ✓</div>
      <div style="font-size:3rem;margin-bottom:1rem;">⏳</div>
      <div style="font-family:var(--font-display);font-size:0.85rem;color:rgba(200,220,255,0.6);letter-spacing:1px;">ESPERANDO QUE EL PROFESOR<br>AUTORICE EL INICIO</div>
      <div style="margin-top:1.5rem;display:flex;justify-content:center;gap:6px;">
        <span class="pulse-dot"></span><span class="pulse-dot" style="animation-delay:0.3s"></span><span class="pulse-dot" style="animation-delay:0.6s"></span>
      </div>
    </div>`;

  // Escuchar el inicio
  onValue(gameRef, s => {
    const d = s.val() || {};
    estado = d;
    if (d.estado === 'reglas') {
      mostrarReglasSoloLectura(grupo, color);
    } else if (d.estado === 'jugando') {
      jugar(grupo, color);
    }
  });
}

function mostrarReglasSoloLectura(grupo, color) {
  const c = document.getElementById('jc');
  if (c.dataset.view === 'reglas_lectura') return;
  c.dataset.view = 'reglas_lectura';
  c.innerHTML = `
    <div class="panel corner-deco animate-up" style="padding:1.5rem;">
      <div style="text-align:center;margin-bottom:1rem;">
        <div class="label" style="margin-bottom:4px;">REGLAMENTO</div>
        <div style="font-family:var(--font-display);font-size:1rem;color:${color};">${grupo}</div>
      </div>
      ${REGLAS.map(r=>`
        <div class="rule-item">
          <span class="rule-icon">${r.icon}</span>
          <div class="rule-text"><strong>${r.title}</strong><br>${r.text}</div>
        </div>`).join('')}
      <div style="text-align:center;margin-top:1.2rem;font-family:var(--font-mono);font-size:11px;color:var(--uv-gold);">EL PARCIAL INICIARÁ EN CUALQUIER MOMENTO...</div>
    </div>`;
}

function jugar(grupo, colorParam) {
  const c = document.getElementById('jc');
  if (c.dataset.view === 'jugando') return;
  c.dataset.view = 'jugando';
  const color = colorParam || GRUP_COLORS[0];
  let respondio = {};
  let timerJugador = null;

  c.innerHTML = `
    <div style="text-align:center;margin-bottom:1rem;">
      <div class="label" style="margin-bottom:4px;">JUGANDO COMO</div>
      <div style="font-family:var(--font-display);font-size:1.6rem;font-weight:900;color:${color};letter-spacing:2px;text-shadow:0 0 20px ${color}50;">${grupo}</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-top:6px;">
        <div id="jp" style="font-family:var(--font-mono);font-size:0.85rem;color:var(--uv-cyan);">0 PTS</div>
        <div id="jcombo" style="display:none;"></div>
      </div>
    </div>
    <div id="je" style="text-align:center;font-family:var(--font-mono);font-size:11px;color:rgba(0,212,255,0.5);margin-bottom:0.8rem;letter-spacing:1px;"></div>
    <!-- Mini timer -->
    <div id="jtimer-wrap" style="display:none;text-align:center;margin-bottom:0.8rem;">
      <svg width="60" height="60" class="timer-ring"><circle class="timer-circle-bg" cx="30" cy="30" r="25"/><circle id="jtimer-circle" class="timer-circle" cx="30" cy="30" r="25" stroke="var(--uv-cyan)" stroke-dasharray="157.08" stroke-dashoffset="0"/></svg>
      <div id="jtimer-num" style="position:absolute;margin-top:-46px;margin-left:0;width:60px;font-family:var(--font-display);font-weight:900;font-size:1.1rem;color:var(--uv-cyan);text-align:center;display:block;"></div>
    </div>
    <div id="jz"></div>`;

  onValue(gameRef, s => {
    const d = s.val() || {};
    estado = d;
    const qi = d.preguntaActual ?? -1;
    const zona = document.getElementById('jz');
    const est = document.getElementById('je');
    const ptsEl = document.getElementById('jp');
    const comboEl = document.getElementById('jcombo');
    if (!zona) return;

    const miPts = d.puntajes?.[grupo] || 0;
    if (ptsEl) ptsEl.textContent = `${miPts} PTS`;

    // Combo badge
    const miCombo = d.combos?.[grupo] || 0;
    if (comboEl) {
      if (miCombo >= 2) {
        const mult = getComboMult(miCombo);
        comboEl.style.display = 'inline-flex';
        comboEl.className = 'combo-badge';
        comboEl.innerHTML = `🔥 COMBO ×${mult.toFixed(2)} <span style="font-family:var(--font-mono);font-size:10px;">(${miCombo} seguidas)</span>`;
      } else {
        comboEl.style.display = 'none';
      }
    }

    if (d.estado === 'esperando' || qi < 0) {
      if (est) est.textContent = 'ESPERANDO INICIO...';
      zona.innerHTML = '';
      return;
    }

    if (d.estado === 'ranking') {
      if (timerJugador) { clearInterval(timerJugador); timerJugador = null; }
      const timerWrap = document.getElementById('jtimer-wrap');
      if (timerWrap) timerWrap.style.display = 'none';
      const pp = d.puntajes||{}, or = Object.entries(pp).sort((a,b)=>b[1]-a[1]);
      const mp = or.findIndex(([g])=>g===grupo)+1;
      const ms = pp[grupo]||0, nt = getNota(mp);
      if (est) est.textContent = '';
      zona.innerHTML = `
        <div class="panel corner-deco animate-up" style="padding:2rem;text-align:center;">
          <div class="label" style="margin-bottom:0.8rem;">RESULTADO FINAL</div>
          <div style="font-family:var(--font-display);font-size:1.3rem;color:${color};margin-bottom:0.4rem;">${grupo}</div>
          <div style="font-family:var(--font-display);font-size:3rem;font-weight:900;color:#fff;line-height:1;">${ms}</div>
          <div style="font-family:var(--font-mono);font-size:11px;color:var(--uv-cyan);margin-bottom:0.3rem;">PUNTOS · PUESTO ${mp}°</div>
          <div style="font-family:var(--font-display);font-size:2.5rem;font-weight:900;color:${nt>=3?'#00ff88':'#ff6b6b'};margin:0.8rem 0 1.5rem;text-shadow:0 0 20px ${nt>=3?'rgba(0,255,136,0.4)':'rgba(255,107,107,0.4)'};">NOTA: ${nt.toFixed(1)}</div>
          <div class="label" style="margin-bottom:0.8rem;">RANKING FINAL</div>
          ${or.map(([g,p],i)=>`
            <div style="display:flex;justify-content:space-between;padding:6px 8px;border-radius:6px;margin-bottom:3px;background:${g===grupo?'rgba(0,48,135,0.4)':'transparent'};border:1px solid ${g===grupo?'rgba(0,212,255,0.2)':'transparent'};">
              <span style="font-family:var(--font-mono);font-size:11px;color:${i===0?'var(--uv-gold)':g===grupo?'var(--uv-cyan)':'rgba(200,220,255,0.6)'}">${i+1}°. ${g}</span>
              <span style="font-family:var(--font-display);font-size:11px;font-weight:700;color:${g===grupo?'#fff':'rgba(200,220,255,0.4)'};">${getNota(i+1).toFixed(1)}</span>
            </div>`).join('')}
        </div>`;
      return;
    }

    if (d.estado !== 'jugando') return;
    const q = PREGUNTAS[qi];
    if (!q) return;

    if (est) est.textContent = `PREGUNTA ${qi+1} DE ${PREGUNTAS.length} · ${q.t}`;

    // Iniciar timer local del jugador
    const timerWrap = document.getElementById('jtimer-wrap');
    if (timerWrap && d.timerStart && !respondio[qi]) {
      timerWrap.style.display = 'block';
      if (timerJugador) clearInterval(timerJugador);
      const circleEl = document.getElementById('jtimer-circle');
      const numEl = document.getElementById('jtimer-num');
      const circ = 157.08;
      timerJugador = setInterval(() => {
        const elapsed = (Date.now() - d.timerStart) / 1000;
        const rem = Math.max(0, TIMER_SECS - elapsed);
        if (numEl) numEl.textContent = Math.ceil(rem);
        if (circleEl) {
          circleEl.style.strokeDashoffset = circ * (1 - rem/TIMER_SECS);
          circleEl.style.stroke = rem <= 5 ? 'var(--uv-red)' : rem <= 15 ? 'var(--uv-gold)' : 'var(--uv-cyan)';
        }
        if (rem <= 0) { clearInterval(timerJugador); timerJugador = null; }
      }, 250);
    }

    const yaR = d.respuestas?.[qi]?.[grupo] !== undefined;
    if (yaR || respondio[qi]) {
      if (timerJugador) { clearInterval(timerJugador); timerJugador = null; }
      if (timerWrap) timerWrap.style.display = 'none';
      const r = d.respuestas?.[qi]?.[grupo];
      const ok = r && r.opcion === q.c;
      const puntos = r ? r.puntos : 0;
      const mult = r ? r.mult : 1;
      zona.innerHTML = `
        <div class="${ok?'result-correct':'result-wrong'} animate-up">
          <div style="font-size:2.5rem;margin-bottom:0.5rem;">${ok?'✅':'❌'}</div>
          <div style="font-family:var(--font-display);font-size:1rem;font-weight:700;color:${ok?'#00ff88':'#ff6b6b'};margin-bottom:0.4rem;">${ok?'¡CORRECTO!':'INCORRECTO'}</div>
          ${ok?`<div style="font-family:var(--font-display);font-size:1.8rem;font-weight:900;color:var(--uv-gold);margin-bottom:0.3rem;">+${puntos} PTS</div>
          ${mult>1?`<div class="combo-badge" style="display:inline-flex;margin:0.3rem auto 0.5rem;">🔥 COMBO ×${mult.toFixed(2)}</div>`:''}
          `:'<div style="font-size:0.8rem;color:rgba(200,220,255,0.6);margin-bottom:0.4rem;">Correcta: <strong style="color:var(--uv-cyan)">${String.fromCharCode(65+q.c)}) ${q.o[q.c]}</strong></div>'}
          <div style="font-family:var(--font-mono);font-size:10px;color:rgba(0,212,255,0.4);margin-top:0.8rem;letter-spacing:1px;">ESPERANDO SIGUIENTE PREGUNTA...</div>
        </div>`;
      respondio[qi] = true;
      return;
    }

    zona.innerHTML = `
      <div class="panel corner-deco animate-up" style="padding:1.2rem;margin-bottom:0.8rem;">
        <div style="font-size:0.95rem;line-height:1.6;color:#f0f8ff;">${q.p}</div>
      </div>
      <div style="display:grid;gap:0.5rem;">
        ${q.o.map((op,i)=>`
          <button onclick="window.jRs('${grupo}',${qi},${i})" class="answer-btn" id="abtn-${i}">
            <span class="letter-badge">${String.fromCharCode(65+i)}</span><span>${op}</span>
          </button>`).join('')}
      </div>`;
  });
}

window.jRs = async (grupo, qi, op) => {
  const d = estado;
  if (d.respuestas?.[qi]?.[grupo] !== undefined) return;

  // Calcular posición (cuántos ya respondieron)
  const yaResp = Object.keys(d.respuestas?.[qi] || {}).length;
  const posicion = yaResp + 1; // 1-indexed

  // Obtener combo actual
  const comboActual = d.combos?.[grupo] || 0;
  const newStreak = posicion <= 3 ? comboActual + 1 : 0;
  const mult = posicion <= 3 ? getComboMult(newStreak) : 1.0;

  const ok = op === PREGUNTAS[qi].c;
  const puntos = ok ? calcPuntos(posicion, newStreak) : 0;
  const paBase = d.puntajes?.[grupo] || 0;

  const u = {};
  u[`respuestas/${qi}/${grupo}`] = { opcion: op, posicion, puntos, mult: posicion <= 3 ? mult : 1.0 };
  if (ok) u[`puntajes/${grupo}`] = paBase + puntos;
  u[`combos/${grupo}`] = posicion <= 3 ? newStreak : 0;
  await update(gameRef, u);

  // Deshabilitar botones
  document.querySelectorAll('.answer-btn').forEach(b => b.classList.add('answered'));
};

// ── INIT ──────────────────────────────────────────────────────────────────────
const v = getView();
if (v === 'profesor') renderProfesor();
else if (v === 'jugador') renderJugador();
else renderInicio();
</script>
</body>
</html>
